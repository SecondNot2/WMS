version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 1
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      all-actions:
        patterns:
          - "*"
